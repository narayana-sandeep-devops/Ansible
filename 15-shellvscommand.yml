- name: ansible command vs shell module
  hosts: local
  connection: local
  tasks:
  - name: command module test
    ansible.builtin.command: cat /etc/passwd
    register: user_list
  
  - name: shell module test
    ansible.builtin.shell: cat /etc/passwd | grep root
    register: user_output
  
  - name: print user user_list
    ansible.builtin.debug:
      msg: " {{ user_list }}"

  - name: print user_output
    ansible.builtin.debug:
      msg: " {{ user_output }}"

  - name: shell module
    ansible.builtin.shell: ls -ltr > file.txt
    register: files_output

  - name: print files user_output
    ansible.builtin.debug:
      msg: "{{ files_output }}"